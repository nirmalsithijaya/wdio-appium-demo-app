name: BrowserStack Android Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: 🏗️ Install Dependencies
        run: npm ci

      - name: 🤖 Run BrowserStack Android Tests
        run: npm run wdioBrowserstack
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
          BROWSERSTACK_APP: ${{ secrets.BROWSERSTACK_APP }}

      - name: 📦 Upload Test Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: browserstack-test-logs-${{ github.run_id }}
          path: |
            logs/
            *.log
          retention-days: 30

      - name: 📊 Upload BrowserStack Performance Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browserstack-performance-report-${{ github.run_id }}
          path: logs/performance-report/
          retention-days: 30