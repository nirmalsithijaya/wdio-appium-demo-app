name: Android Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: npm install -g appium

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb shell screenrecord /data/local/tmp/recording.mp4 &
            RECORD_PID=$!
            set +e
            npx wdio run config/wdio-android.conf.js --spec test/specs/android/loginPOM.e2e.js
            TEST_EXIT_CODE=$?
            set -e
            adb shell pkill -SIGINT screenrecord || true
            sleep 5
            adb pull /data/local/tmp/recording.mp4 recording.mp4 || echo "No recording found"
            if [ "$TEST_EXIT_CODE" -eq 0 ]; then
              rm -f recording.mp4 || true
            fi
            kill $RECORD_PID || true
            exit $TEST_EXIT_CODE

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug-initial-screen.png
          if-no-files-found: warn

      - name: Upload screen recording
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screen-recording
          path: recording.mp4
          if-no-files-found: warn

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: warn

      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure-report
